name: CI-CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: springboot-demo
  ECR_REGISTRY: 405604663356.dkr.ecr.ap-southeast-2.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─────────────────────────────
  # Job 1: Build & Test
  # ─────────────────────────────
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: 📦 Build JAR
        run: mvn clean package -DskipTests

      - name: 🧪 Run Tests
        run: mvn test

      - name: 📤 Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/demo.jar

  # ─────────────────────────────
  # Job 2: Docker Build & Push
  # ─────────────────────────────
  docker:
    name: 🐳 Docker Build & Push to ECR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: 📦 Build JAR
        run: mvn clean package -DskipTests

      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔑 Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: 🐳 Build & Push Docker Image
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # ─────────────────────────────
  # Job 3: Deploy to EC2
  # ─────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin 405604663356.dkr.ecr.ap-southeast-2.amazonaws.com

            docker stop springboot-app || true
            docker rm springboot-app || true

            docker pull 405604663356.dkr.ecr.ap-southeast-2.amazonaws.com/springboot-demo:latest

            docker run -d \
              --name springboot-app \
              -p 8080:8080 \
              --restart unless-stopped \
              405604663356.dkr.ecr.ap-southeast-2.amazonaws.com/springboot-demo:latest

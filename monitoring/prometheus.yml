global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot application
  - job_name: 'springboot-app'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 7s
    static_configs:
      - targets: ['app:8080']
        labels:
          application: 'springboot-aws-cicd-demo'
